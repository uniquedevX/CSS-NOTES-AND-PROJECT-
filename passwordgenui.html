<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random pass generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100%;
            height: 100vh;
            background-color: rgb(253, 247, 247);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            border: 2px solid transparent;
            width: 50vh;
            height: 50%;
            border-radius: 20px;
            background-color: rgb(172, 142, 142);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #btn1 {
            width: 80px;
            height: 25px;
            padding: 0 auto;
            cursor: pointer;
            border-radius: 20px;
            color: rgb(0, 0, 0);
            font-weight: 500;
            text-transform: capitalize;
            margin-top: 20px;
            transition: background-color .4s linear;
            outline: none;
            border: none;
        }

        #btn1:hover {
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            border: none;
        }

        input {
            height: 35px;
            width: 300px;
            border-radius: 20px;
            text-align: center;
            padding-right: 40px;
            /* Creates invisible space on the right for the icon */
            padding-left: 40px;
            /* Keeps the text perfectly centered */
            border: 1px solid #ccc;
            outline: none;
        }

        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .input-wrapper {
            position: relative;
            display: inline-block;
        }

        #copy-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #555;
            font-size: 16px;
            transition: color 0.2s ease;
        }
        #copy-btn:hover {
            color: #000;
        }
        #head{
            text-align: justify;
            font-size: medium;
            transform:translateY(-60px);
            text-transform: capitalize;
            font-size: 25px;
            font-weight: bolder;

        }
    </style>

<body>
    <section class="container">  
        <div class="main">
            <h1 id="head">Random Pass generator</h1>
            <div class="input-wrapper">
                <input type="text" readonly placeholder="Your password will appear here!">
                <button id="copy-btn" title="Copy to clipboard">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>

            <button id="btn1">Generate</button>
        </div>
    </section>

</body>
</html>
