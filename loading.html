<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project-5</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body{
            height:100vh;
            background-color: rgb(0, 0, 0);
            display: grid;
            place-items: center;

        }
        .main{
            background-color: rgb(0, 17, 255);
           aspect-ratio: 1;
            width: 140px;
            border-radius: 50%;
            position: relative;
            animation: rotate 1s linear infinite;
        }
        .main::before{
            content: "";
            position: absolute;
            background-color: rgb(0, 0, 0);
            top:0;
            left:0;
            width: 120px;
            aspect-ratio: 1;
            z-index: 1;
            border-radius: 50% ;           
        }
            .main::after{
            content: "";
            position: absolute;
            background-color: rgb(0, 17, 255);
            top: -14px;
            right: 55px;
            width: 30px;
            aspect-ratio: 1;
            z-index: 1;
            border-radius: 50% ;   
        }
        @keyframes rotate{
            0%{
                rotate: 0deg;
            }
            100%{
                rotate: -360deg;
            }
        }

    </style>
</head>
<body>  
       <div class="main">

        </div>
    
</body>
</html>
