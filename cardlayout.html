<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card-Layout</title>
    <style>
        * {
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: grey;
                width: 100%;
                height: 100vh;
                display: flex;
                place-items: center;
                justify-content: space-evenly;
            }

            .card {
                background-color: aliceblue;
                width: 300px;
                height: 380px;
                border-radius: 20px;
                box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
                display: flex;
                flex-direction: column;
                padding: 20px;
            }

            .card2 {
                flex: 1;
                width: 100%;
                border-radius: 10px;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #ddd;
            }

            .card2 img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .card-content {
                flex: 1;
                width: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
            }

            .card-content h3 {
                margin-bottom: 6px;
                color: #111;
            }

            .card-content p {
                color: #666;
                font-size: 14px;
                line-height: 1.4;
            }
            span{
                color: rgb(255, 0, 0);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card2">
            <img src="/img/7.jpg" alt="Profile">
        </div>

        <div class="card-content">
            <h3>World Cup Mood On!</h3>
            <p>I am supporter of <span> Brazil</span> whom do you support!?</p>
        </div>
    </div>
     <div class="card">
        <div class="card2">
            <img src="/img/5.jpg" alt="Profile">
        </div>

        <div class="card-content">
            <h3>World Cup Mood On!</h3>
            <p>I am supporter of <span> Argentina</span> whom do you support!?</p>
        </div>
    </div>
    <div class="card">
        <div class="card2">
            <img src="/img/6.jpg" alt="Profile">
        </div>

        <div class="card-content">
            <h3>World Cup Mood On!</h3>
            <p>I am supporter of <span> Portugal</span> whom do you support!?</p>
        </div>
    </div>


</body>

</html>
