<!DOCTYPE html>

<html lang="en">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="The best spotyfy clone by the begineer">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="spotyfy.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <title>Spotyfy Clone | Play Music |</title>



</head>



<body>



    <!--Header and Navigation-->

    <header>

        <nav class="navbar">

            <div class="right-nav">

                <div class="logo">

                    <i class="fa-brands fa-spotify"></i>

                </div>

                <div class="home">

                    <i class="fa-solid fa-house"></i>

                </div>

                <div class="searchbar">

                    <i class="fa-solid fa-magnifying-glass search-icon"></i>

                    <input type="text" placeholder="What do you want to play?">

                    <i class="fa-solid fa-folder-open folder-icon"></i>

                </div>

            </div>

            <div class="midnav">

                <p>Premium</p>

                <p>Support</p>

                <p>Download</p>

            </div>

            <div class="endnav">

                <div class="install-app">

                    <i class="fa-solid fa-circle-down"></i>

                    <p>Install</p>

                </div>

                <p class="signup">Signup</p>

                <button class="login-btn">Log-in</button>

            </div>

        </nav>

    </header>



    <!--Main portion-->

    <main>

        <div class="main-left">

            <div class="containermlhead">
                <div class="library">Your Library</div>
                <div class="plus">+</div>
            </div>
            <div class="leftflexcard">
            <div class="leftcard1">
                <h2 class="leftcardheader">Create your first playlist</h2>
                <p class="leftcardp">Its easy,we'll help you</p>
                <button class="playlistbtn">Create Playlist</button>
            </div>
            <div class="leftcard2">
                <h2 class="leftcardheader">Lets find some podcast to follow!</h2>
                <p class="leftcardp">We will keep you updated !</p>
                <button class="playlistbtn">Browse Podcast</button>
            </div>
            </div>
        </div>



        <div class="main-right">









        </div>

    </main>

    <footer>
        hello
    </footer>





</body>



</html>
