<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robot" content="index:follow">
    <meta name="description" content="Best Resources to learn web and app devlopment!">
    <title> CODIFY - LTC</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            font-size: 60px;
            padding-top: 120px;
        }

        span {
            color: red;
        }

        body {
            background: hsla(228, 17%, 53%, 1);
            background: linear-gradient(90deg, hsla(228, 17%, 53%, 1) 0%, hsla(229, 28%, 88%, 1) 100%);
            background: -moz-linear-gradient(90deg, hsla(228, 17%, 53%, 1) 0%, hsla(229, 28%, 88%, 1) 100%);
            background: -webkit-linear-gradient(90deg, hsla(228, 17%, 53%, 1) 0%, hsla(229, 28%, 88%, 1) 100%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
        }

        html {
            font-family: poppins;
            font-size: 16px;
        }

        h1 {
            font-variant: small-caps;
        }

        nav {
            margin-top: 15px;
            text-align: right;
            margin-right: 25px;
        }

        button {
            background-color: rgb(0, 0, 0);
            color: white;
            border-radius: 35px;
            padding: 8px 15px;
            border: none;
            margin-left: 12px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
            transition: 0.4s ease;
        }

        button:hover {
            background-color: rgb(255, 0, 0);
            color: black;
        }

        a {
            text-decoration: none;
        }

        main {
            text-align: center;
            padding-top: 30px;
        }

        #cont {
            background-color: rgb(255, 0, 0);
            color: white;
            border-radius: 35px;
            padding: 12px 30px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            margin-top: 0;
            margin-left: 0;
            transition: 0.4s ease;
        }

        #cont:hover {
            background-color: rgb(200, 0, 0);
            color: white;
        }

        h2 {
            text-align: center;
            font-size: 36px;
            color: white;
            margin-top: 50px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        

        /* Tablet screens (768px and below) used Ai  */
        @media (max-width: 768px) {
            h1 {
                font-size: 45px;
                padding-top: 80px;
            }

            nav {
                margin-right: 15px;
                font-size: 14px;
            }

            button {
                padding: 7px 12px;
                margin-left: 8px;
                font-size: 13px;
            }
        }

        /* Small mobile (480px and below) used Ai */
        @media (max-width: 480px) {
            h1 {
                font-size: 35px;
                padding-top: 230px;
            }

            nav {
                text-align: center;
                margin-right: 0;
                display: block;
            }

            button {
                padding: 8px 12px;
                margin: 5px;
                font-size: 12px;
                display: inline-block;
            }

            a {
                display: inline-block;
                margin: 5px;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="signup.html" target="_blank">
                <button type="button">Sign up</button>
            </a>
            <a href="signin.html" target="_blank">
                <button type="button">Sign in</button>
            </a>
        </nav>
        <div>
            <h1>
                CODIFY - <span> LEARN </span> TO CODE
            </h1>
        </div>
    </header>
    <main>
        <a href="page1.html">
            <button id="cont" type="button">CONTINUE DEMO</button>
        </a>
        <br>

    </main>
</body>

</html>
