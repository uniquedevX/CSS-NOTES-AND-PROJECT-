<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-4</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body{
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: blue;

        }
        .main{
            width: 50%;
            height: 50%;
            border-top: 10px solid black ;
            display: flex;
            justify-content: center;
            gap: 35px;
            

        }
        
        div{
            width: 8px;
            height: 200px;
            background-color: black;
            position: relative;
        }
        div::before {
            content: "";
            position: absolute;
            bottom: 0;
            width: 40px;
            height: 32px;
            left: -16px;
            background-color: black;
            border-radius: 50%;
        }
.main :first-child {
    animation: leftswing 2s ease-out infinite;
    transform-origin: top center; 
}

.main :last-child {
    animation: rightswing 2s ease-out infinite;
    transform-origin: top center; 
}
@keyframes leftswing {
    0% { 
        rotate: 0deg; 
    }
    25% {
         rotate: 30deg;
         }   
    50% { 
        rotate: 0deg;
     }   
    100% {
         rotate: 0deg; 
        }   
}

@keyframes rightswing {
    0% { 
        rotate: 0deg;
     }     
    50% { 
        rotate: 0deg;
     }    
    75% {
         rotate: -30deg;
         }  
    100% { 
        rotate: 0deg;
     }   
}
    
    </style>
</head>
<body>
    <section class="main">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>   
</body>
</html>
